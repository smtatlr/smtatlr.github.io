<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mall Builder</title>
  <meta name="description" content="Mall Builder resmi geliştirici sayfası." />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1d1d1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      max-width: 680px;
      margin: 24px;
      padding: 32px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 32px;
    }
    p {
      line-height: 1.6;
      font-size: 17px;
    }
    a {
      color: #0071e3;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .small {
      margin-top: 24px;
      font-size: 14px;
      color: #6e6e73;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mall Builder</h1>
    <p>
      Welcome to the official developer page for Mall Builder.
    </p>
    <p>
      This website is used to support app distribution and advertising verification.
    </p>
    <p>
      app-ads.txt: <a href="/app-ads.txt">View app-ads.txt</a>
    </p>
    <p class="small">
      © 2026 Mall Builder
    </p>
  </main>
</body>
</html>
